*{font-family:'Be Vietnam Pro',sans-serif;box-sizing:border-box}
html,body{height:100%;margin:0;padding:0}

.fade-in{animation:fadeIn .4s ease}

.progress-bar{height:8px;background:#e0e0e0;border-radius:9999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--pink));border-radius:9999px;transition:width .5s ease}
.option-btn{border:2px solid #ddd;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .2s;background:#fff;text-align:left;width:100%;font-size:15px}
.option-btn:hover{border-color:var(--accent);background:#f0f8ff}
.option-btn.correct{border-color:var(--success);background:#d4edda;animation:pulse .4s}
.option-btn.wrong{border-color:var(--error);background:#f8d7da}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.confetti{position:fixed;pointer-events:none;z-index:9999}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.input-field{border:2px solid #ddd;border-radius:12px;padding:12px 16px;font-size:16px;width:100%;transition:border-color .2s;outline:none}
.input-field:focus{border-color:var(--accent)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;color:#fff;font-weight:600;z-index:9999;animation:toastIn .4s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.vocab-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;border-left:4px solid var(--accent)}
.section-tag{font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700}

.match-item.wrong-match{border-color:var(--error);background:#f8d7da}
.spinner{width:40px;height:40px;border:3px solid #e0e0e0;border-top:3px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite}

// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudioCtx(){
  try{if(!audioCtx)audioCtx=new AudioCtx();return audioCtx}catch(e){console.warn("Audio context failed:",e);return null}
}
function playDing(){
  try{
    const c=getAudioCtx();if(!c)return;
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=880;g.gain.value=0.3;o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.5);o.stop(c.currentTime+0.5)
  }catch(e){console.warn("Ding failed:",e)}
}
function playBuzz(){
  try{
    const c=getAudioCtx();if(!c)return;
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=150;g.gain.value=0.15;o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.3)
  }catch(e){console.warn("Buzz failed:",e)}
}
function speakWord(word){
  try{
    if(!window.speechSynthesis)return;
    const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=0.85;speechSynthesis.speak(u)
  }catch(e){console.warn("Speech failed:",e)}
}

// ===== CONFETTI =====
function showConfetti(){
  const c=document.createElement('div');c.className='confetti';document.body.appendChild(c);
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.style.cssText=`position:fixed;width:8px;height:8px;background:${['#FFAFCC','#457B9D','#A8DADC','#FFD700','#FF6B6B'][Math.floor(Math.random()*5)]};border-radius:50%;left:${Math.random()*100}%;top:-10px;z-index:9999;animation:fall ${1+Math.random()*2}s ease-out forwards`;

  }

// ===== TOAST =====
function showToast(msg,type='success'){
  const t=document.createElement('div');t.className='toast';
  t.style.background=type==='success'?'var(--success)':'var(--error)';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function startGame(part){
  currentGame=part;currentQ=0;score=0;answered=false;
  if(part===1)generateMC();
  else if(part===2)generateFIB();
  else if(part===3)generateMixed();
  else if(part===4)generateMaster();
  currentScreen='game';render();
}

// ===== PART 1: MULTIPLE CHOICE =====
function generateMC(){
  gameQuestions=shuffle(VOCAB).map(v=>{
    const wrongs=shuffle(VOCAB.filter(x=>x.id!==v.id)).slice(0,3);
    const opts=shuffle([v,...wrongs]);
    return{type:'mc',vocab:v,options:opts,correctId:v.id};
  });
}

// ===== PART 2: FILL IN BLANK =====
function generateFIB(){
  gameQuestions=shuffle(VOCAB).map(v=>({type:'fib',vocab:v}));
}

// ===== PART 3: MIXED =====
function generateMixed(){
  const all=shuffle(VOCAB);
  gameQuestions=[];
  all.forEach((v,i)=>{
    const mode=i%4;
    if(mode===0){
      const wrongs=shuffle(VOCAB.filter(x=>x.id!==v.id)).slice(0,3);
      const opts=shuffle([v,...wrongs]);
      gameQuestions.push({type:'mc',vocab:v,options:opts,correctId:v.id});
    }else if(mode===1){
      gameQuestions.push({type:'fib',vocab:v});
    }else if(mode===2){
      gameQuestions.push({type:'sentence',vocab:v});
    }else{
      const wrongs=shuffle(VOCAB.filter(x=>x.id!==v.id)).slice(0,3);
      const opts=shuffle([v,...wrongs]);
      gameQuestions.push({type:'mc_reverse',vocab:v,options:opts,correctId:v.id});
    }
  });
}

// ===== PART 4: MASTER =====
function generateMaster(){
  const all=shuffle(VOCAB);
  gameQuestions=[];
  all.forEach((v,i)=>{
    const mode=i%2;
    if(mode===0){
      const wrongs=shuffle(VOCAB.filter(x=>x.id!==v.id)).slice(0,3);
      const opts=shuffle([v,...wrongs]);
      gameQuestions.push({type:'master_mc',vocab:v,options:opts,correctId:v.id});
    }else{
      gameQuestions.push({type:'sentence',vocab:v});
    }
  });
}

function renderGame(app){
  if(currentQ>=gameQuestions.length){
    const pct=Math.round(score/gameQuestions.length*100);
    progress[`p${currentGame}`]=Math.max(progress[`p${currentGame}`],pct);
    saveProgress();
    currentScreen='result';render();return;
  }
  const q=gameQuestions[currentQ];
  const titles=['','🔵 Multiple Choice','🟡 Fill in the Blank','🟣 Mixed Mode','🔴 Master Test'];
  app.innerHTML=`
  <div class="min-h-full p-4 fade-in">

    </div>
  </div>`;
  lucide.createIcons();
  renderQuestion(q);
}

function checkMC(correctId,chosenId,btn){
  if(answered)return;answered=true;
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>{b.style.pointerEvents='none';});
  if(chosenId===correctId){
    btn.classList.add('correct');score++;playDing();showConfetti();
    showToast('✅ Chính xác!','success');
  }else{
    btn.classList.add('wrong');playBuzz();
    btns.forEach(b=>{if(b.textContent.includes(VOCAB.find(v=>v.id===correctId).en))b.classList.add('correct')});
    showToast('❌ Sai rồi!','error');
  }
  showExplanation(gameQuestions[currentQ].vocab);showNextBtn();
}

function checkFIB(){
  if(answered)return;
  const inp=document.getElementById('fibInput');
  const val=inp.value.trim().toLowerCase();
  const q=gameQuestions[currentQ];
  const correct=q.vocab.en.toLowerCase();
  const alts=[correct];
  answered=true;
  if(alts.some(a=>val===a||val===a.replace(/\s+/g,' '))||correct.includes(val)&&val.length>3){
    inp.style.borderColor='var(--success)';inp.style.background='#d4edda';score++;playDing();showConfetti();
    showToast('✅ Chính xác!','success');
  }else{
    inp.style.borderColor='var(--error)';inp.style.background='#f8d7da';playBuzz();
    showToast(`Đáp án: ${q.vocab.en}`,'error');
  }
  showExplanation(q.vocab);showNextBtn();
}

function checkSentence(){
  if(answered)return;
  const inp=document.getElementById('fibInput');
  const val=inp.value.trim().toLowerCase();
  const q=gameQuestions[currentQ];
  const word=q.vocab.en.toLowerCase().split('/')[0].trim();
  const words=[word];
  answered=true;
  if(words.some(w=>val===w||val.includes(w)&&val.length>3)){
    inp.style.borderColor='var(--success)';inp.style.background='#d4edda';score++;playDing();showConfetti();
    showToast('✅ Chính xác!','success');
  }else{
    inp.style.borderColor='var(--error)';inp.style.background='#f8d7da';playBuzz();
    showToast(`Đáp án: ${q.vocab.en}`,'error');
  }
  showExplanation(q.vocab);showNextBtn();
}

      <div class="flex items-center gap-3 mb-4">
        <button onclick="currentScreen='home';render()" class="p-2 rounded-lg" style="background:#fff"><i data-lucide="arrow-left" style="width:20px;height:20px"></i></button>
        <h2 class="text-xl font-700" style="color:var(--dark)">📘 Từ vựng đầy đủ (${VOCAB.length} từ)</h2>
      </div>
      <input id="vocabSearch" class="input-field mb-4" placeholder="🔍 Tìm kiếm từ vựng..." oninput="filterVocab(this.value)">
      <div id="vocabContainer">${renderVocabCards(VOCAB)}</div>
    </div>
  </div>`;
  lucide.createIcons();
}

function renderVocabCards(list){
  return list.map(v=>`
  <div class="vocab-card card-hover fade-in">
    <div class="flex items-start justify-between mb-2">
      <div>
        <span class="font-700 text-lg" style="color:var(--dark)">${v.en}</span>
        <span class="ml-2 text-sm opacity-60">${v.ipa}</span>
        <span class="tag ml-2" style="background:var(--bg)">${v.pos}</span>
      </div>
      <button onclick="speakWord('${v.en.replace(/'/g,"\\'")}')" class="p-1 rounded-full flex-shrink-0" style="background:var(--pink)"><i data-lucide="volume-2" style="width:16px;height:16px"></i></button>
    </div>
    <p class="font-600 mb-1" style="color:var(--accent)">${v.vi}</p>
    <p class="text-sm opacity-70 mb-2">${v.enDef}</p>
    ${v.usage?`<p class="text-sm mb-2" style="color:var(--accent)">💡 ${v.usage}</p>`:''}
    <details class="mt-2">
      <summary class="text-sm font-600 cursor-pointer" style="color:var(--accent)">Xem chi tiết ▾</summary>
      <div class="mt-2 space-y-1 text-sm pl-2" style="border-left:2px solid var(--bg)">
        <p><strong>Collocations:</strong> ${v.collocations.join(', ')}</p>
        <p><strong>Synonyms:</strong> ${v.synonyms.join(', ')}</p>
        <p><strong>Antonyms:</strong> ${v.antonyms.join(', ')}</p>
        <p><strong>Word family:</strong> ${v.wordFamily.join(', ')}</p>
        <p class="mt-1 p-2 rounded-lg" style="background:#f8f9fa"><strong>Example:</strong> ${v.example}</p>
        <p class="p-2 rounded-lg" style="background:#f0f8ff;color:var(--accent)"><strong>Dịch:</strong> ${v.exampleVi}</p>
      </div>
    </details>
  </div>`).join('');
}

function filterVocab(term){
  const t=term.toLowerCase();
  const filtered=VOCAB.filter(v=>v.en.toLowerCase().includes(t)||v.vi.toLowerCase().includes(t)||v.enDef.toLowerCase().includes(t));
  document.getElementById('vocabContainer').innerHTML=renderVocabCards(filtered);
  lucide.createIcons();
}

// ===== START =====
render();
  </script>
 </body>
</html>
